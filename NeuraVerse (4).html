      <div class="settRow"><div><b>🔊 Sound effects</b><br><span class="sub">Clicks, success chimes, feedback</span></div>
        <button class="switch ${S.sound?'on':''}" id="setSound" role="switch" aria-checked="${S.sound}" aria-label="sound effects"></button></div>
      <div class="settRow"><div><b>🎵 Background ambience</b><br><span class="sub">Soft synth pad while you study</span></div>
        <button class="switch ${S.ambience?'on':''}" id="setAmb" role="switch" aria-checked="${S.ambience}" aria-label="ambience"></button></div>
      <div class="settRow" style="border:none"><div><b>♻️ Reset all progress</b><br><span class="sub">Wipes XP, completion & achievements</span></div>
        <button class="btn ghost sm" id="setReset" style="color:var(--bad)">Reset</button></div>
    </div>`;
  $('#setName',pg).addEventListener('change',e=>{ S.name=e.target.value.trim(); save(); toast('Name saved!','👤'); });

/* ---------- global search index (topics, quiz modes, revision tabs) ---------- */
function buildSearchIndex(){
  const ix = [];
  TOPICS.forEach(t=>ix.push({kind:'TOPIC', label:t.title, sub:t.blurb, go:['lesson',t.id], ic:t.ic}));
  KEYWORDS.forEach(([k,d])=>ix.push({kind:'TERM', label:k, sub:d, go:['revision'], ic:'book'}));
  [['MCQ Challenge','All 50 questions · 5 modes','quiz','target'],
   ['Simulation Lab','Every interactive experiment','sims','flask'],
   ['Challenge Arcade','6 mini-games','challenges','gamepad'],
   ['Revision Mode','Mind map · flashcards · summary','revision','book'],
   ['Exam Prep','VSA / SA / LA / Case / A-R / HOTS','exam','exam'],
   ['Progress & Achievements','XP, streaks, certificate','progress','chart'],
   ['Leaderboard','Practice league','leaderboard','trophy'],
   ['Settings','Theme, sound, name','settings','gear'],
  ].forEach(([l,s,g,ic])=>ix.push({kind:'PAGE', label:l, sub:s, go:[g], ic}));
  return ix;
}
function openSearch(){
  if($('.searchOverlay')) return;
  const idx = buildSearchIndex();
  const ov = el('div','searchOverlay');
  ov.innerHTML = `<div class="searchBox">
      <input type="search" id="srIn" placeholder="Search topics, terms, pages…  (Esc to close)" aria-label="search">
    </div><div class="searchRes" id="srRes" role="listbox"></div>`;
  document.body.appendChild(ov);
  const inp = $('#srIn',ov), res = $('#srRes',ov);
  function render(q){
    res.innerHTML='';
    const ql = q.trim().toLowerCase();
    const hits = ql ? idx.filter(x=>(x.label+' '+x.sub).toLowerCase().includes(ql)).slice(0,12)
                    : idx.filter(x=>x.kind==='PAGE');
    if(!hits.length){ res.appendChild(el('div','sub','No matches — try "neural", "clustering", "quiz"…')).style.padding='12px'; return; }
    hits.forEach(h=>{
      const b = el('button','', `<span class="srKind">${h.kind}</span>
        <span style="color:var(--cyan)">${icon(h.ic,18)}</span>
        <span style="flex:1"><b>${h.label}</b><br><span class="sub" style="font-size:.78rem">${h.sub.slice(0,80)}</span></span>`);
      b.onclick = ()=>{ close(); go(h.go[0], h.go[1]); };
      res.appendChild(b);
    });
  }
  function close(){ ov.remove(); removeEventListener('keydown', esc); }
  function esc(e){ if(e.key==='Escape') close(); }
  addEventListener('keydown', esc);
  ov.addEventListener('click', e=>{ if(e.target===ov) close(); });
  inp.addEventListener('input', ()=>render(inp.value));
  render(''); inp.focus();
}

/* ---------- first-run onboarding (3 steps) ---------- */
function runOnboarding(){
  const steps = [
    {ic:'logo', h:'Welcome to NeuraVerse', p:'Your CBSE AI Unit 2 notes, rebuilt as an interactive lab. Every definition becomes something you can drag, train, and play with — no memorising required.'},
    {ic:'bolt', h:'Earn XP · Keep your streak', p:'Finishing topics, winning games and acing quizzes earns XP and unlocks achievements. Come back daily to grow your streak — it is tracked automatically.'},
    {ic:'map',  h:'Follow the Learning Path', p:'Topics unlock one by one, from AI basics to neural networks. Prefer to roam? The Simulation Lab and Quiz modes are always open. Ready?'},
  ];
  let i = 0;
  const ov = el('div','onbOverlay'); document.body.appendChild(ov);
  function draw(){
    const s = steps[i], last = i===steps.length-1;
    ov.innerHTML = `<div class="onbCard glass gborder">
      <span class="obIc">${icon(s.ic,34)}</span>
      <h2>${s.h}</h2><p>${s.p}</p>
      <div class="onbDots">${steps.map((_,k)=>`<i class="${k===i?'on':''}"></i>`).join('')}</div>
      ${last?`<input class="txtIn" id="obName" placeholder="Your name (for the certificate)" aria-label="your name"
        style="max-width:280px;margin:0 auto 16px;display:block" value="${S.name||''}">`:''}
      <div style="display:flex;gap:10px;justify-content:center">
        ${i? `<button class="btn ghost sm" id="obBack">${icon('arrowL',15)} Back</button>`:''}
        <button class="btn primary sm" id="obNext">${last?'Start Learning '+icon('play',15):'Next '+icon('arrowR',15)}</button>
        ${!last?'<button class="btn ghost sm" id="obSkip">Skip</button>':''}
      </div></div>`;
    const done = ()=>{ S.onboarded = true; save(); ov.remove(); };
    $('#obNext',ov).onclick = ()=>{
      if(i < steps.length-1){ i++; draw(); AudioFX.pop(); }
      else{ const n=$('#obName',ov); if(n && n.value.trim()){ S.name=n.value.trim(); }
        done(); go('path'); }
    };
    const bk=$('#obBack',ov); if(bk) bk.onclick=()=>{ i--; draw(); };
    const sk=$('#obSkip',ov); if(sk) sk.onclick=done;
  }
  draw();
}

/* ---------- boot ---------- */
(function boot(){
  /* aurora blobs + cursor-spotlight grid (behind everything) */
  ['a1','a2','a3'].forEach(c=>{ const b=el('div','aur '+c); b.setAttribute('aria-hidden','true'); document.body.prepend(b); });
  const sg=el('div'); sg.id='spotGrid'; sg.setAttribute('aria-hidden','true'); document.body.prepend(sg);

  /* developer strip — static, solid, always visible at the very top */
  const ticker = el('div','ticker');
  ticker.setAttribute('role','note'); ticker.setAttribute('aria-label','developed by A. Kritthik Shriraman');
  ticker.innerHTML = `<div class="tk"><b>DEVELOPED BY <span class="tkName">A. KRITTHIK SHRIRAMAN</span></b><span>◆</span><b style="opacity:.55">NEURAVERSE · MODELING IN AI</b></div>`;
  document.body.prepend(ticker);

  /* skip link for keyboard users */
  const skip = el('a','skipLink','Skip to content');
  skip.href='#app'; document.body.prepend(skip);

  /* top bar */
  const bar = el('nav','topbar');
  bar.innerHTML = `
    <div class="brand" id="brandBtn" role="button" tabindex="0" aria-label="home">
      <span class="logo">${icon('logo',20)}</span> Neura<em>Verse</em></div>
    <div class="spacer"></div>
    <div class="navlinks" role="navigation">
      ${[['path','LEARN'],['sims','LAB'],['quiz','MCQ'],['challenges','PLAY'],
         ['revision','REVISE'],['exam','EXAM'],['progress','STATS']]
        .map(([id,l])=>`<button data-go="${id}">${l}</button>`).join('')}
    </div>
    <span class="xpchip" title="Experience points">${icon('bolt',13)} <span id="xpVal">${S.xp}</span> XP</span>
    <button class="iconbtn" id="searchBtn" title="search (press /)" aria-label="search">${icon('search',18)}</button>
    <button class="iconbtn" id="soundBtn" title="toggle sound" aria-label="toggle sound">${icon(S.sound?'soundOn':'soundOff',18)}</button>
    <button class="iconbtn" id="themeBtn" title="toggle theme" aria-label="toggle theme">${icon('sun',18)}</button>`;
  document.body.prepend(bar);

  /* mobile bottom nav */
  const bn = el('nav','bottomNav');
  bn.setAttribute('aria-label','mobile navigation');
  bn.innerHTML = [['home','home','Home'],['path','map','Learn'],['quiz','target','MCQ'],
                  ['challenges','gamepad','Play'],['progress','chart','Stats']]
    .map(([id,ic,l])=>`<button data-go="${id}">${icon(ic,20)}<span>${l}</span></button>`).join('');
  document.body.appendChild(bn);
  $$('button',bn).forEach(b=>b.onclick=()=>go(b.dataset.go));

  /* global navigation entry point (used by pages) */
  window.NAV = (name,param)=>go(name,param);

  const goHome=()=>go('home');
  $('#brandBtn').addEventListener('click',goHome);
  $('#brandBtn').addEventListener('keydown',e=>{ if(e.key==='Enter')goHome(); });
  $$('.navlinks button',bar).forEach(b=>b.onclick=()=>go(b.dataset.go));
  $('#searchBtn').onclick=openSearch;
  $('#themeBtn').onclick=()=>{ S.theme=S.theme==='dark'?'light':'dark'; save(); applyTheme(); };
  $('#soundBtn').onclick=e=>{ S.sound=!S.sound; save();
    e.currentTarget.innerHTML=icon(S.sound?'soundOn':'soundOff',18); if(S.sound)AudioFX.good(); };

  /* keyboard shortcuts: 1-7 sections, H home, / search */
  addEventListener('keydown',e=>{
    if(e.target.matches('input,select,textarea')) return;
    if(e.key==='/'){ e.preventDefault(); openSearch(); return; }
    const map={'1':'path','2':'sims','3':'quiz','4':'challenges','5':'revision','6':'exam','7':'progress','h':'home','H':'home'};
    if(map[e.key]) go(map[e.key]);
  });

  applyTheme();
  startBackground();
  startCursorFX();
  if(S.ambience) AudioFX.ambience(true);

  /* launch: honor a deep-link hash if present, else home */
  const {name,param} = parseHash();
  renderRoute(ROUTES[name]?name:'home', param);
  if(!location.hash) history.replaceState(null,'','#/home');

  if(!S.onboarded) runOnboarding();
})();
